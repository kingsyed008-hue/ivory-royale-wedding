<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syed Suhail & Taskeen Fathima</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Door overlay -->
    <div class="door-overlay" id="doorOverlay">
        <div class="door-left" id="doorLeft">
            <div class="door-content">
                <div class="door-bismillah">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
                <div class="door-assalamu">Assalamu Alaikum Wa Rahmatullahi Wa Barakatuh</div>
                <div class="door-invite-text">Reception Invitation</div>
                <button class="open-btn" id="openBtn">Open</button>
            </div>
        </div>
        <div class="door-right" id="doorRight">
            <div class="door-content" style="visibility:hidden;"></div>
        </div>
    </div>

    <!-- Music toggle -->
    <div class="music-toggle" id="musicToggle">🎵</div>

    <!-- Main content -->
    <div class="invitation-container" id="invitationContainer">
        <div class="welcome-card">
            <div class="bismillah">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>
            <div class="heart">♥</div>
            <h1 class="couple-name">Syed Suhail</h1>
            <p class="and-symbol">&</p>
            <h1 class="couple-name">Taskeen Fathima</h1>
            <p class="subtext">We joyfully invite you to our wedding celebration</p>
            <div class="menu-grid">
                <a href="story.html" class="menu-card">
                    <span class="menu-icon">📖</span>
                    <span>Our Story</span>
                </a>
                <a href="events.html" class="menu-card">
                    <span class="menu-icon">💒</span>
                    <span>Events</span>
                </a>
                <a href="countdown.html" class="menu-card">
                    <span class="menu-icon">⏳</span>
                    <span>Countdown</span>
                </a>
                <a href="gallery.html" class="menu-card">
                    <span class="menu-icon">🖼️</span>
                    <span>Gallery</span>
                </a>
                <a href="blessings.html" class="menu-card">
                    <span class="menu-icon">🤲</span>
                    <span>Blessings</span>
                </a>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>
    <script src="js/script.js"></script>
</body>
</html>
